<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ملك الألغاز</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game">
    <!-- أزرار علوية -->
    <div class="top-controls">
      <button class="btn-icon" onclick="openSettings()">⚙️</button>
      <button class="btn-icon exit-btn" onclick="exitQuestion()">✖</button>
    </div>

    <h1>ملك الألغاز</h1>

    <!-- شاشة اختيار المواضيع -->
    <div id="topic-selection">
      <h2 style="color:#FFD700;margin-bottom:25px">اختر الموضوع</h2>
      <button class="btn" onclick="startCategory('ثقافة عامة')">ثقافة عامة</button>
      <button class="btn" onclick="startCategory('تاريخ')">تاريخ</button>
      <button class="btn" onclick="startCategory('علوم')">علوم</button>
      <button class="btn" onclick="startCategory('رياضة')">رياضة</button>
      <button class="btn" onclick="startCategory('دين')">دين</button>
      <button class="btn" onclick="startCategory('ألغاز ذكاء')">ألغاز ذكاء</button>
    </div>

    <div id="play" class="hidden">
      <div id="question" style="font-size:1.8rem;margin:40px 0;line-height:1.7"></div>
      <div id="choices"></div>
      <button class="btn premium" onclick="useHint()">تلميح (-30 عملة)</button>
      <button class="btn" onclick="watchRewardAd()">شاهد إعلان = 50 عملة</button>
      <div id="timer"><div id="timer-bar"></div></div>
      <div id="feedback"></div>
    </div>

    <div id="end" class="hidden">
      <h2 style="font-size:3rem;color:#FFD700">مبروك يا ملك!</h2>
      <div style="font-size:3.2rem;color:#FFD700;margin:30px">النقاط: <span id="finalScore">0</span></div>
      <button class="btn" onclick="showTopicScreen()">العب تاني</button>
    </div>
  </div>

  <!-- نافذة الإعدادات -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <h2>الإعدادات</h2>
      <label><input type="checkbox" id="sound-toggle" checked> تشغيل الصوت</label>
      <label><input type="checkbox" id="dark-mode-toggle"> الوضع الليلي</label>
      <button class="btn" onclick="saveSettings()">حفظ</button>
      <button class="btn" onclick="closeSettings()">إغلاق</button>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
